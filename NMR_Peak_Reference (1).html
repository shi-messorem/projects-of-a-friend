<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMR Peak Reference — Gottlieb 1997 + Fulmer 2010</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;0,700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg:#080b10; --surf:#0e1219; --surf2:#141820; --surf3:#1c2230;
  --bdr:#222840; --bdr2:#2d3550;
  --acc-1h:#00d4ff; --acc-13c:#ff9f1c; --acc:#00d4ff;
  --red:#ff3d6b; --grn:#50fa7b;
  --txt:#dde3f0; --dim:#5a6480; --mid:#8a92a8;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  --shadow:0 2px 12px rgba(0,0,0,.4);
}
/* ── LIGHT THEME ── */
body.light {
  --bg:#f0f2f7; --surf:#ffffff; --surf2:#f5f7fb; --surf3:#eaecf4;
  --bdr:#d4d8e8; --bdr2:#c0c6da;
  --txt:#1a1f2e; --dim:#7a82a0; --mid:#4a5270;
  --shadow:0 2px 12px rgba(0,0,0,.1);
}
body.light tbody tr:hover{background:rgba(0,150,200,.05);}
body.light tbody tr.hlr{background:rgba(255,61,107,.07) !important;}
body.light tbody tr.hlr:hover{background:rgba(255,61,107,.12) !important;}
body.light tbody tr.peak-match{background:rgba(0,150,200,.08) !important;}
body.light tbody tr.peak-match:hover{background:rgba(0,150,200,.14) !important;}
body.light .sv-btn.active{background:rgba(0,130,180,.1);border-color:rgba(0,130,180,.38);}
body.light .nuc-toggle{background:var(--surf2);}
body.light ::-webkit-scrollbar-thumb{background:#c0c6da;}
body.light .peak-banner{background:rgba(0,150,200,.06);border-bottom-color:rgba(0,150,200,.2);}
body.light .detail{box-shadow:0 -4px 30px rgba(0,0,0,.12);}

/* Light theme — ppm bold black, larger proton/mult/solvent */
body.light .td-sh{color:#000 !important;font-size:14px;font-weight:800;}
body.light .hlr .td-sh{color:var(--red) !important;}
body.light .td-pro{font-size:13px;color:#2a2f42;}
body.light .td-mult{font-size:12px;color:#3a4060;}
body.light .sv-chip{font-size:12px;color:#2a3050;}
body.light td{font-size:13px;}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);height:100vh;overflow:hidden;display:flex;flex-direction:column;transition:background .25s,color .25s;}
header,aside,main,.toolbar,.spec-wrap,.detail,.peak-results,.peak-res-header,
thead,.sbs,.sv-btn,.inp,.si,.tol-inp,.peak-search-inp,.sv-chip,.tbadge,.pill{
  transition:background .25s,border-color .25s,color .25s;
}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:10px;padding:0 18px;height:52px;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:60;}
.logo{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--acc);white-space:nowrap;transition:color .3s;letter-spacing:-.01em;}
.hsep{width:1px;height:20px;background:var(--bdr2);flex-shrink:0;}
.hsubtitle{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.07em;white-space:nowrap;}
.nuc-toggle{display:flex;background:var(--bg);border:1px solid var(--bdr2);border-radius:8px;padding:3px;gap:3px;flex-shrink:0;}
.nuc-btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:5px 13px;border:none;border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:.04em;background:transparent;color:var(--dim);}
.nuc-btn.h.active{background:var(--acc-1h);color:#000;}
.nuc-btn.c.active{background:var(--acc-13c);color:#000;}

/* Peak search in header */
.peak-search-wrap{position:relative;flex-shrink:0;}
.peak-search-inp{
  background:var(--surf2);border:1.5px solid var(--bdr2);color:var(--txt);
  font-family:var(--mono);font-size:13px;font-weight:600;
  padding:6px 36px 6px 10px;border-radius:6px;outline:none;
  width:140px;transition:border-color .2s,box-shadow .2s;
}
.peak-search-inp:focus{border-color:var(--acc);box-shadow:0 0 0 2px color-mix(in srgb,var(--acc) 18%,transparent);}
.peak-search-inp::placeholder{color:var(--dim);font-weight:400;font-size:11px;}
.peak-search-unit{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10px;color:var(--acc);pointer-events:none;}
.peak-search-label{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.08em;white-space:nowrap;}

/* Peak search results dropdown */
.peak-results{
  position:absolute;top:calc(100% + 6px);left:0;right:0;min-width:360px;
  background:var(--surf2);border:1px solid var(--bdr2);border-radius:8px;
  box-shadow:0 8px 40px rgba(0,0,0,.6);z-index:200;overflow:hidden;
  display:none;
}
.peak-results.open{display:block;}
.peak-res-header{padding:8px 12px;background:var(--surf3);border-bottom:1px solid var(--bdr);font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
.peak-res-header span{color:var(--acc);}
.peak-res-list{max-height:260px;overflow-y:auto;}
.peak-res-row{padding:8px 12px;border-bottom:1px solid rgba(34,40,64,.5);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:10px;}
.peak-res-row:hover{background:rgba(0,212,255,.05);}
.peak-res-row:last-child{border-bottom:none;}
.prr-shift{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--acc);width:52px;flex-shrink:0;}
.prr-cpd{font-size:12px;font-weight:500;flex:1;}
.prr-pro{font-family:var(--mono);font-size:10px;color:var(--mid);}
.prr-sv{font-family:var(--mono);font-size:10px;display:flex;align-items:center;gap:4px;}
.prr-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.prr-empty{padding:18px 12px;font-family:var(--mono);font-size:11px;color:var(--dim);text-align:center;}

.hright{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.pill{font-family:var(--mono);font-size:10px;color:var(--dim);background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;padding:3px 10px;}

/* ── APP NAME ── */
.app-name{
  font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  color:var(--dim);white-space:nowrap;
  transition:color .25s;
  line-height:1.2;
}
body.light .app-name{color:#4a5270;}

/* ── THEME TOGGLE ── */
.theme-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--surf2);border:1px solid var(--bdr2);
  color:var(--mid);font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.06em;padding:5px 10px;border-radius:20px;
  cursor:pointer;transition:all .2s;flex-shrink:0;
  white-space:nowrap;
}
.theme-btn:hover{border-color:var(--acc);color:var(--acc);}
.theme-icon{font-size:13px;line-height:1;transition:transform .4s;}
body.light .theme-icon{transform:rotate(180deg);}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:252px 1fr;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;}
.sbs{padding:12px 12px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.sbl{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;}

.rg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:7px;}
.fl{font-family:var(--mono);font-size:9px;color:var(--dim);margin-bottom:3px;}
.iw{position:relative;}
.inp{width:100%;background:var(--surf2);border:1px solid var(--bdr2);color:var(--txt);font-family:var(--mono);font-size:12px;padding:7px 24px 7px 8px;border-radius:5px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--acc);}
.inp::placeholder{color:var(--dim);}
.iu{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:9px;color:var(--acc);pointer-events:none;}

.btn-add{width:100%;padding:7px;background:var(--red);border:none;border-radius:5px;color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:opacity .2s;}
.btn-add:hover{opacity:.82;}
.btn-clr{width:100%;margin-top:4px;padding:6px;background:transparent;border:1px solid var(--bdr2);color:var(--dim);font-family:var(--mono);font-size:10px;border-radius:5px;cursor:pointer;transition:all .2s;}
.btn-clr:hover{border-color:var(--mid);color:var(--txt);}

.rtags{display:flex;flex-direction:column;gap:3px;max-height:90px;overflow-y:auto;}
.rtag{display:flex;align-items:center;justify-content:space-between;background:rgba(255,61,107,.1);border:1px solid rgba(255,61,107,.35);border-radius:4px;padding:4px 8px;font-family:var(--mono);font-size:10px;color:var(--red);}
.rtag-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;opacity:.6;}
.rtag-del:hover{opacity:1;}

.sv-scroll{flex:1;overflow-y:auto;padding:5px 6px;}
.sv-btn{width:100%;text-align:left;background:transparent;border:1px solid transparent;color:var(--mid);font-family:var(--sans);font-size:11.5px;padding:5px 8px;border-radius:5px;cursor:pointer;transition:all .13s;display:flex;align-items:center;gap:7px;margin-bottom:1px;}
.sv-btn:hover{background:var(--surf2);color:var(--txt);border-color:var(--bdr2);}
.sv-btn.active{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.38);color:var(--acc);font-weight:600;}
.sv-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sv-cnt{margin-left:auto;font-family:var(--mono);font-size:9px;opacity:.4;}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden;}
.toolbar{padding:8px 14px;background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sw{position:relative;flex:1;max-width:280px;}
.si{width:100%;background:var(--surf2);border:1px solid var(--bdr2);color:var(--txt);font-family:var(--sans);font-size:12px;padding:7px 28px 7px 10px;border-radius:5px;outline:none;transition:border-color .2s;}
.si:focus{border-color:var(--acc);}
.si::placeholder{color:var(--dim);}
.sico{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none;}
.tol-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tol-label{font-family:var(--mono);font-size:9px;color:var(--dim);white-space:nowrap;}
.tol-inp{width:56px;background:var(--surf2);border:1px solid var(--bdr2);color:var(--acc);font-family:var(--mono);font-size:11px;padding:6px 5px;border-radius:5px;outline:none;text-align:center;transition:border-color .2s;}
.tol-inp:focus{border-color:var(--acc);}
.rinfo{font-family:var(--mono);font-size:10px;color:var(--dim);margin-left:auto;white-space:nowrap;}

/* Spectrum */
.spec-wrap{padding:10px 16px 6px;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.spec-title{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;}
.spec-cw{position:relative;height:44px;}
#specCanvas{display:block;width:100%;height:44px;}
.spec-ticks{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:2px;}

/* Table */
.tscroll{flex:1;overflow-y:auto;}
table{width:100%;border-collapse:collapse;}
thead{position:sticky;top:0;z-index:10;background:var(--surf2);}
th{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);padding:8px 12px;text-align:left;border-bottom:1px solid var(--bdr);font-weight:400;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--mid);}
th.sorted{color:var(--acc);}
tbody tr{border-bottom:1px solid rgba(34,40,64,.5);transition:background .1s;cursor:pointer;}
tbody tr:hover{background:rgba(0,212,255,.03);}
tbody tr.hlr{background:rgba(255,61,107,.09) !important;}
tbody tr.hlr:hover{background:rgba(255,61,107,.14) !important;}
tbody tr.peak-match{background:rgba(0,212,255,.07) !important;}
tbody tr.peak-match:hover{background:rgba(0,212,255,.12) !important;}
tbody tr.peak-match.hlr{background:rgba(255,200,0,.1) !important;}
td{padding:0 12px;height:33px;font-size:12px;vertical-align:middle;}
.td-n{font-family:var(--mono);font-size:9px;color:rgba(90,100,128,.35);width:34px;}
.td-cpd{font-weight:500;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.td-pro{font-family:var(--mono);font-size:11px;color:var(--mid);}
.td-sh{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--acc);white-space:nowrap;transition:color .3s;}
.hlr .td-sh{color:var(--red) !important;}
.peak-match .td-sh{color:var(--acc) !important;}
.peak-match .td-cpd{color:var(--txt);}
.td-mult{font-family:var(--mono);font-size:10px;color:var(--dim);}
.td-notes{font-family:var(--mono);font-size:10px;color:var(--dim);max-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.sv-chip{display:inline-flex;align-items:center;gap:4px;background:var(--surf3);border:1px solid var(--bdr);border-radius:4px;padding:2px 6px;font-family:var(--mono);font-size:10px;color:var(--mid);white-space:nowrap;}
.sv-chip-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.tbadge{display:inline-block;padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.05em;}
.t-solvent{background:rgba(80,250,123,.1);color:#50fa7b;border:1px solid rgba(80,250,123,.25);}
.t-compound{background:rgba(0,212,255,.1);color:#00d4ff;border:1px solid rgba(0,212,255,.25);}
.t-impurity{background:rgba(255,193,7,.1);color:#ffc107;border:1px solid rgba(255,193,7,.25);}
.t-reference{background:rgba(180,100,220,.12);color:#ce93d8;border:1px solid rgba(180,100,220,.25);}

/* Detail panel */
.detail{position:fixed;bottom:0;left:252px;right:0;background:var(--surf2);border-top:2px solid var(--acc);padding:10px 20px;display:flex;align-items:center;gap:16px;transform:translateY(100%);transition:transform .22s ease,border-color .3s;z-index:40;box-shadow:0 -6px 40px rgba(0,0,0,.5);}
.detail.open{transform:translateY(0);}
.d-shift{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--acc);line-height:1;transition:color .3s;}
.d-shift span{font-size:11px;color:var(--dim);}
.d-info{flex:1;}
.d-cpd{font-size:14px;font-weight:600;margin-bottom:2px;}
.d-sub{font-family:var(--mono);font-size:10px;color:var(--dim);}
.d-close{background:none;border:1px solid var(--bdr2);color:var(--dim);width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.d-close:hover{color:var(--txt);border-color:var(--mid);}

/* Peak match banner */
.peak-banner{display:none;padding:6px 16px;background:rgba(0,212,255,.06);border-bottom:1px solid rgba(0,212,255,.2);font-family:var(--mono);font-size:10px;color:var(--acc);flex-shrink:0;align-items:center;gap:8px;}
.peak-banner.show{display:flex;}
.pb-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;margin-left:auto;}
.pb-close:hover{color:var(--txt);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:8px;color:var(--dim);}
.empty-i{font-size:32px;opacity:.2;}
.empty-t{font-family:var(--mono);font-size:11px;}
@keyframes rIn{from{opacity:0;transform:translateX(-3px)}to{opacity:1;transform:translateX(0)}}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <div class="logo" id="logoTxt">¹H NMR</div>
  <div class="hsep"></div>
  <div class="hsubtitle">Gottlieb et al. JOC 1997 &nbsp;+&nbsp; Fulmer et al. Organometallics 2010</div>
  <div class="nuc-toggle">
    <button class="nuc-btn h active" id="btnH" onclick="setNucleus('H')">¹H</button>
    <button class="nuc-btn c" id="btnC" onclick="setNucleus('C')">¹³C</button>
  </div>
  <div class="hsep"></div>
  <!-- ★ PEAK SEARCH -->
  <div class="peak-search-label">Search δ:</div>
  <div class="peak-search-wrap" id="peakSearchWrap">
    <input class="peak-search-inp" id="peakInp" type="number" step="0.01" placeholder="e.g. 7.26" autocomplete="off">
    <span class="peak-search-unit">ppm</span>
    <div class="peak-results" id="peakResults">
      <div class="peak-res-header">Matches within <span id="prTolSpan">±0.05</span> ppm <span id="prCount"></span></div>
      <div class="peak-res-list" id="prList"></div>
    </div>
  </div>
  <div class="hright">
    <div class="app-name">Manoj's NMR Peak Reference v.1.0</div>
    <div class="hsep"></div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle light/dark theme">
      <span class="theme-icon" id="themeIcon">🌙</span>
      <span id="themeLabel">DARK</span>
    </button>
    <span class="pill" id="totPill">— entries</span>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sbs">
      <div class="sbl">🔴 Highlight δ Range</div>
      <div class="rg">
        <div><div class="fl">From</div><div class="iw"><input class="inp" id="rF" type="number" step="0.01" placeholder="0.00"><span class="iu">δ</span></div></div>
        <div><div class="fl">To</div><div class="iw"><input class="inp" id="rT" type="number" step="0.01" placeholder="0.00"><span class="iu">δ</span></div></div>
      </div>
      <button class="btn-add" onclick="addRange()">ADD HIGHLIGHT RANGE</button>
      <button class="btn-clr" onclick="clearRanges()">✕ Clear all highlights</button>
    </div>
    <div class="sbs" id="rTagsSec" style="display:none">
      <div class="sbl">Active Ranges</div>
      <div class="rtags" id="rTagsEl"></div>
    </div>
    <div class="sbs" style="border-bottom:none;padding-bottom:5px"><div class="sbl">Filter by Solvent</div></div>
    <div class="sv-scroll" id="svList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="toolbar">
      <div class="sw"><input class="si" id="srch" placeholder="Search compound, proton, mult…"><span class="sico">⌕</span></div>
      <div class="tol-wrap">
        <span class="tol-label">Tolerance ±</span>
        <input class="tol-inp" id="tolInp" type="number" value="0.05" step="0.01" min="0.001" max="2">
        <span style="font-family:var(--mono);font-size:9px;color:var(--dim)">ppm</span>
      </div>
      <span class="rinfo" id="rinfo"></span>
    </div>

    <!-- Peak match banner -->
    <div class="peak-banner" id="peakBanner">
      <span id="bannerTxt"></span>
      <button class="pb-close" onclick="clearPeakSearch()" title="Clear peak search">✕ clear</button>
    </div>

    <!-- Spectrum -->
    <div class="spec-wrap">
      <div class="spec-title" id="specTitle">¹H Chemical Shift Overview (δ ppm)</div>
      <div class="spec-cw"><canvas id="specCanvas" height="44"></canvas></div>
      <div class="spec-ticks" id="specTicks"></div>
    </div>

    <div class="tscroll">
      <table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table>
      <div class="empty" id="empty" style="display:none"><div class="empty-i">⊘</div><div class="empty-t">No entries match.</div></div>
    </div>
  </main>
</div>

<div class="detail" id="detPanel">
  <div><div class="d-shift" id="dSh">—<span> ppm</span></div></div>
  <div class="d-info"><div class="d-cpd" id="dCpd">—</div><div class="d-sub" id="dSub">—</div></div>
  <button class="d-close" onclick="closeDetail()">✕</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// SOLVENTS — ordered as requested + 3 additional from Fulmer 2010
// ═══════════════════════════════════════════════════════════════════════
const SOLVENTS = [
  {id:'CDCl3',   name:'CDCl₃',       color:'#00d4ff', src:'Gottlieb 1997'},

];

// ═══════════════════════════════════════════════════════════════════════
// EXPAND TO FLAT ROWS
// ═══════════════════════════════════════════════════════════════════════
let uid=0;
function expand(raw){
  const out=[];
  raw.forEach(e=>{
    SOLVENTS.forEach(sv=>{
      const val=e.v[sv.id];
      if(val!==undefined){
        out.push({id:uid++,cpd:e.c,pro:e.p,mult:e.m,shift:val,solvent:sv.id,type:e.t,notes:e.n});
      }
    });
  });
  return out;
}
const rows1H=expand(H1);
const rows13C=expand(C13);

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
let nucleus='H', activeSv=null, searchQ='', ranges=[], sortK='shift', sortD=1;
let peakQuery=null, tolerance=0.05;
const allRows=()=>nucleus==='H'?rows1H:rows13C;

// ═══════════════════════════════════════════════════════════════════════
// NUCLEUS SWITCH
// ═══════════════════════════════════════════════════════════════════════
function setNucleus(n){
  nucleus=n;
  document.getElementById('btnH').classList.toggle('active',n==='H');
  document.getElementById('btnC').classList.toggle('active',n==='C');
  const col=n==='H'?'#00d4ff':'#ff9f1c';
  document.documentElement.style.setProperty('--acc',col);
  document.getElementById('logoTxt').textContent=n==='H'?'¹H NMR':'¹³C NMR';
  document.getElementById('specTitle').textContent=n==='H'?'¹H Chemical Shift Overview (δ ppm)':'¹³C Chemical Shift Overview (δ ppm)';
  document.getElementById('detPanel').style.borderTopColor=col;
  activeSv=null; ranges=[]; searchQ=''; peakQuery=null;
  document.getElementById('srch').value='';
  document.getElementById('peakInp').value='';
  renderHighlightTags(); hidePeakResults(); updateBanner(); closeDetail(); renderAll();
}

// ═══════════════════════════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════════════════════════
function filtered(){
  let d=allRows();
  if(activeSv) d=d.filter(r=>r.solvent===activeSv);
  if(searchQ){
    const q=searchQ.toLowerCase();
    d=d.filter(r=>r.cpd.toLowerCase().includes(q)||r.pro.toLowerCase().includes(q)||
      r.mult.toLowerCase().includes(q)||r.type.toLowerCase().includes(q)||
      r.notes.toLowerCase().includes(q)||String(r.shift).includes(q));
  }
  return [...d].sort((a,b)=>{
    let av=a[sortK],bv=b[sortK];
    if(av===null)return 1;if(bv===null)return -1;
    if(typeof av==='string'){av=av.toLowerCase();bv=bv.toLowerCase();}
    return av<bv?-sortD:av>bv?sortD:0;
  });
}

// ═══════════════════════════════════════════════════════════════════════
// PEAK SEARCH (header box)
// ═══════════════════════════════════════════════════════════════════════
function getPeakMatches(ppm){
  const tol=tolerance;
  // Search across ALL solvents (ignore active solvent filter for discovery)
  return allRows().filter(r=>r.shift!==null&&Math.abs(r.shift-ppm)<=tol)
    .sort((a,b)=>Math.abs(a.shift-ppm)-Math.abs(b.shift-ppm));
}

function showPeakResults(ppm){
  const matches=getPeakMatches(ppm);
  const list=document.getElementById('prList');
  const el=document.getElementById('peakResults');
  document.getElementById('prTolSpan').textContent=`±${tolerance.toFixed(2)}`;
  document.getElementById('prCount').textContent=`— ${matches.length} match${matches.length!==1?'es':''}`;

  if(!matches.length){
    list.innerHTML=`<div class="prr-empty">No peaks within ±${tolerance.toFixed(2)} ppm of δ ${ppm.toFixed(2)}</div>`;
  } else {
    list.innerHTML=matches.slice(0,30).map(r=>{
      const sv=SV[r.solvent];
      const col=sv?sv.color:'#888';
      const diff=(r.shift-ppm);
      const diffStr=(diff>=0?'+':'')+diff.toFixed(3);
      return `<div class="peak-res-row" onclick="jumpToRow(${r.id})">
        <span class="prr-shift">${r.shift.toFixed(2)}</span>
        <span class="prr-cpd">${r.cpd}</span>
        <span class="prr-pro">${r.pro}</span>
        <span class="prr-sv"><span class="prr-dot" style="background:${col}"></span>${sv?sv.name:r.solvent}</span>
        <span style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-left:4px">${diffStr}</span>
      </div>`;
    }).join('');
  }
  el.classList.add('open');
  el.style.animation='dropIn .18s ease both';
}

function hidePeakResults(){
  document.getElementById('peakResults').classList.remove('open');
}

function doPeakSearch(){
  const val=parseFloat(document.getElementById('peakInp').value);
  if(isNaN(val)){hidePeakResults();peakQuery=null;updateBanner();renderAll();return;}
  peakQuery=val;
  showPeakResults(val);
  updateBanner();
  renderAll();
}

function clearPeakSearch(){
  peakQuery=null;
  document.getElementById('peakInp').value='';
  hidePeakResults();
  updateBanner();
  renderAll();
}

function jumpToRow(id){
  // Expand to show that row in main table, scroll to it
  hidePeakResults();
  // highlight it temporarily
  setTimeout(()=>{
    const tr=document.querySelector(`tr[data-rid="${id}"]`);
    if(tr){tr.scrollIntoView({block:'center',behavior:'smooth'});tr.style.outline='2px solid var(--acc)';setTimeout(()=>{tr.style.outline='';},1200);}
  },60);
}

function updateBanner(){
  const banner=document.getElementById('peakBanner');
  const txt=document.getElementById('bannerTxt');
  if(peakQuery===null){banner.classList.remove('show');return;}
  const matches=getPeakMatches(peakQuery);
  const inView=filtered().filter(r=>r.shift!==null&&Math.abs(r.shift-peakQuery)<=tolerance);
  banner.classList.add('show');
  txt.innerHTML=`🔍 Peak search: <strong>δ ${peakQuery.toFixed(2)} ±${tolerance.toFixed(2)} ppm</strong> — ${matches.length} total match${matches.length!==1?'es':''} across all solvents · ${inView.length} visible in current view`;
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER SOLVENTS
// ═══════════════════════════════════════════════════════════════════════
function renderSolvents(){
  const el=document.getElementById('svList');el.innerHTML='';
  const data=allRows();
  const ab=document.createElement('button');
  ab.className='sv-btn'+(activeSv===null?' active':'');
  ab.innerHTML=`<span class="sv-dot" style="background:#ffffff15;border:1px solid #445"></span>All Solvents<span class="sv-cnt">${data.length}</span>`;
  ab.onclick=()=>{activeSv=null;renderAll();};
  el.appendChild(ab);
  SOLVENTS.forEach(sv=>{
    const cnt=data.filter(r=>r.solvent===sv.id).length;
    if(!cnt)return;
    const b=document.createElement('button');
    b.className='sv-btn'+(activeSv===sv.id?' active':'');
    b.innerHTML=`<span class="sv-dot" style="background:${sv.color}"></span>${sv.name}<span class="sv-cnt">${cnt}</span>`;
    b.onclick=()=>{activeSv=activeSv===sv.id?null:sv.id;renderAll();};
    el.appendChild(b);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER TABLE
// ═══════════════════════════════════════════════════════════════════════
function renderTable(){
  const data=filtered();
  const tbody=document.getElementById('tbody');
  const empty=document.getElementById('empty');
  document.getElementById('rinfo').textContent=`${data.length} entries`;
  document.getElementById('totPill').textContent=`${allRows().length} entries`;

  const isC=nucleus==='C';
  const cols=[
    {k:'',lbl:'#',sort:false},
    {k:'cpd',lbl:'Compound',sort:true},
    {k:'pro',lbl:isC?'Carbon':'Proton',sort:true},
    {k:'shift',lbl:'δ (ppm)',sort:true},
    {k:'mult',lbl:'Mult.',sort:true,hide:isC},
    {k:'solvent',lbl:'Solvent',sort:true},
    {k:'type',lbl:'Type',sort:true},
    {k:'notes',lbl:'Notes',sort:false},
  ].filter(c=>!c.hide);

  const thead=document.getElementById('thead');
  thead.innerHTML=cols.map(c=>{
    const ar=c.k===sortK?(sortD===1?' ↑':' ↓'):' ↕';
    return `<th class="${c.k===sortK?'sorted':''}" onclick="${c.sort?`sortBy('${c.k}')`:''}" style="${!c.sort?'cursor:default':''}">${c.lbl}${c.sort?`<span style="opacity:0.45;font-size:9px">${ar}</span>`:''}</th>`;
  }).join('');

  if(!data.length){tbody.innerHTML='';empty.style.display='flex';return;}
  empty.style.display='none';

  tbody.innerHTML=data.map((r,i)=>{
    const hlRange=ranges.some(rg=>r.shift!==null&&r.shift>=rg.from&&r.shift<=rg.to);
    const hlPeak=peakQuery!==null&&r.shift!==null&&Math.abs(r.shift-peakQuery)<=tolerance;
    const sv=SV[r.solvent];
    const col=sv?sv.color:'#888';
    const svName=sv?sv.name:r.solvent;
    const sh=r.shift!==null?r.shift.toFixed(2):'—';
    const multCell=isC?'':`<td class="td-mult">${r.mult}</td>`;
    let rowClass='';
    if(hlRange&&hlPeak)rowClass='hlr peak-match';
    else if(hlRange)rowClass='hlr';
    else if(hlPeak)rowClass='peak-match';
    return `<tr class="${rowClass}" data-rid="${r.id}" onclick="showDetail(${r.id})" style="animation:rIn 0.15s ${Math.min(i*0.006,0.2)}s both">
      <td class="td-n">${i+1}</td>
      <td class="td-cpd" title="${r.cpd}">${r.cpd}</td>
      <td class="td-pro">${r.pro}</td>
      <td class="td-sh">${sh}</td>
      ${multCell}
      <td><span class="sv-chip"><span class="sv-chip-dot" style="background:${col}"></span>${svName}</span></td>
      <td><span class="tbadge t-${r.type}">${r.type}</span></td>
      <td class="td-notes" title="${r.notes}">${r.notes||'—'}</td>
    </tr>`;
  }).join('');

  // Auto-scroll to first peak match
  if(peakQuery!==null){
    setTimeout(()=>{
      const first=document.querySelector('tr.peak-match');
      if(first)first.scrollIntoView({block:'nearest',behavior:'smooth'});
    },50);
  }
}

function sortBy(k){if(sortK===k)sortD=-sortD;else{sortK=k;sortD=1;}renderTable();}

// ═══════════════════════════════════════════════════════════════════════
// SPECTRUM
// ═══════════════════════════════════════════════════════════════════════
function renderSpectrum(){
  const canvas=document.getElementById('specCanvas');
  const W=canvas.parentElement.offsetWidth||900;
  canvas.width=W;canvas.height=44;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,44);

  const isC=nucleus==='C';
  const minP=isC?-5:-.5,maxP=isC?225:14.5;
  const data=filtered();
  const ticks=isC?[0,20,40,60,80,100,120,140,160,180,200,220]:[14,12,10,8,6,4,3,2,1,0];
  document.getElementById('specTicks').innerHTML=ticks.map(t=>`<span>${t}</span>`).join('');
  const toX=ppm=>isC?((ppm-minP)/(maxP-minP))*W:((maxP-ppm)/(maxP-minP))*W;

  // Range highlights
  ranges.forEach(r=>{
    const x1=toX(r.from),x2=toX(r.to),xl=Math.min(x1,x2),xr=Math.max(x1,x2);
    ctx.fillStyle='rgba(255,61,107,.12)';ctx.fillRect(xl,0,xr-xl,44);
    ctx.strokeStyle='rgba(255,61,107,.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(xl,0);ctx.lineTo(xl,44);ctx.stroke();
    ctx.beginPath();ctx.moveTo(xr,0);ctx.lineTo(xr,44);ctx.stroke();
  });

  // Peak search indicator line
  if(peakQuery!==null){
    const xp=toX(peakQuery);
    // tolerance band
    const xl=toX(peakQuery-tolerance),xr=toX(peakQuery+tolerance);
    ctx.fillStyle='rgba(0,212,255,.1)';ctx.fillRect(Math.min(xl,xr),0,Math.abs(xr-xl),44);
    // center line
    ctx.strokeStyle='rgba(0,212,255,.85)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(xp,0);ctx.lineTo(xp,44);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Peaks
  data.forEach(r=>{
    if(r.shift===null)return;
    const x=toX(r.shift);if(x<0||x>W)return;
    const sv=SV[r.solvent];
    const col=sv?sv.color:'#888';
    const hlR=ranges.some(rg=>r.shift>=rg.from&&r.shift<=rg.to);
    const hlP=peakQuery!==null&&Math.abs(r.shift-peakQuery)<=tolerance;
    const h=hlR||hlP?38:r.type==='solvent'?28:16;
    const alpha=hlR||hlP?1:0.5;
    ctx.globalAlpha=alpha;
    ctx.strokeStyle=hlR?'#ff3d6b':hlP?'#00d4ff':col;
    ctx.lineWidth=hlR||hlP?2:1.5;
    ctx.beginPath();ctx.moveTo(x,43);ctx.lineTo(x,43-h);ctx.stroke();
    ctx.fillStyle=hlR?'#ff3d6b':hlP?'#00d4ff':col;
    ctx.beginPath();ctx.arc(x,43-h,hlR||hlP?3:1.8,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  ctx.strokeStyle=isLight?'#c0c6da':'#2d3550';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,43);ctx.lineTo(W,43);ctx.stroke();
}

// ═══════════════════════════════════════════════════════════════════════
// HIGHLIGHT RANGES
// ═══════════════════════════════════════════════════════════════════════
function addRange(){
  const a=parseFloat(document.getElementById('rF').value);
  const b=parseFloat(document.getElementById('rT').value);
  if(isNaN(a)||isNaN(b))return;
  ranges.push({from:Math.min(a,b),to:Math.max(a,b)});
  document.getElementById('rF').value='';document.getElementById('rT').value='';
  renderHighlightTags();renderAll();
}
function removeRange(i){ranges.splice(i,1);renderHighlightTags();renderAll();}
function clearRanges(){ranges=[];renderHighlightTags();renderAll();}
function renderHighlightTags(){
  const sec=document.getElementById('rTagsSec');
  const el=document.getElementById('rTagsEl');
  if(!ranges.length){sec.style.display='none';return;}
  sec.style.display='block';
  el.innerHTML=ranges.map((r,i)=>`<div class="rtag"><span>δ ${r.from.toFixed(2)}–${r.to.toFixed(2)}</span><button class="rtag-del" onclick="removeRange(${i})">×</button></div>`).join('');
}

// ═══════════════════════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════════════════════
function showDetail(id){
  const r=[...rows1H,...rows13C].find(x=>x.id===id);if(!r)return;
  const sv=SV[r.solvent];
  document.getElementById('dSh').innerHTML=`${r.shift!==null?r.shift.toFixed(2):'—'}<span> ppm</span>`;
  document.getElementById('dCpd').textContent=r.cpd;
  document.getElementById('dSub').textContent=[r.pro,r.mult&&r.mult!=='—'?r.mult:null,sv?.name,r.type,r.notes||null].filter(Boolean).join(' · ');
  document.getElementById('detPanel').classList.add('open');
}
function closeDetail(){document.getElementById('detPanel').classList.remove('open');}

// ═══════════════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('srch').addEventListener('input',function(){searchQ=this.value.trim();renderAll();});
['rF','rT'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')addRange();}));
window.addEventListener('resize',renderSpectrum);

// Peak search input
const peakInp=document.getElementById('peakInp');
peakInp.addEventListener('keydown',e=>{if(e.key==='Enter'){doPeakSearch();}});
peakInp.addEventListener('input',function(){
  const val=parseFloat(this.value);
  if(isNaN(val)){hidePeakResults();peakQuery=null;updateBanner();renderAll();}
});
// Close dropdown on outside click
document.addEventListener('click',e=>{
  const wrap=document.getElementById('peakSearchWrap');
  if(!wrap.contains(e.target))hidePeakResults();
});

// Tolerance input
document.getElementById('tolInp').addEventListener('change',function(){
  const v=parseFloat(this.value);
  if(!isNaN(v)&&v>0)tolerance=v;
  else this.value=tolerance.toFixed(2);
  if(peakQuery!==null){showPeakResults(peakQuery);updateBanner();}
  renderAll();
});

// ═══════════════════════════════════════════════════════════════════════
// THEME TOGGLE
// ═══════════════════════════════════════════════════════════════════════
let isLight=false;
function toggleTheme(){
  isLight=!isLight;
  document.body.classList.toggle('light',isLight);
  document.getElementById('themeIcon').textContent=isLight?'☀️':'🌙';
  document.getElementById('themeLabel').textContent=isLight?'LIGHT':'DARK';
  // Re-render spectrum so canvas colours update
  renderSpectrum();
}

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
function renderAll(){renderSolvents();renderTable();renderSpectrum();updateBanner();}
renderAll();
</script>
